<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Qwen3-Omni{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <span class="brand-mark">Q3</span>
        <div>
          <h1>Qwen3-Omni</h1>
          <p class="subtitle">Multimodal inference on port 7860</p>
        </div>
      </div>
      {% block header_actions %}{% endblock %}
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
